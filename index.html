<style>

:root{--bg:#1a1410;--surface:#2a2018;--surface2:#3a2e22;--surface3:#4a3c2e;--accent:#c8915a;--accent2:#d4a574;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;--cyan:#22d3ee;--orange:#fb923c;--text:#f0e6d8;--text2:#a89880;--radius:14px}

.cart-product{flex:1;font-size:13px;font-weight:500}
.cart-qty{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);margin:0 12px}

.cart-divider{height:1px;background:rgba(255,255,255,.06);margin:16px 0}

.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid rgba(255,255,255,.06);border-radius:8px;max-height:200px;overflow-y:auto;z-index:10;display:none;margin-top:4px}

.log-details{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--text2)}
.uib{display:flex;align-items:center;gap:14px;background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:14px}

.quick-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}

.quick-icon{font-size:24px}

<script>
const LOGO='logo.png';
let SCRIPT_URL=localStorage.getItem('scriptUrl')||'';
const S={
  screen:'setup',setupStep:1,tab:'home',sheetId:localStorage.getItem('sheetId')||'',apiKey:localStorage.getItem('apiKey')||'',
  connected:false,currentUser:null,usuarios:[],catalogo:[],inventario:[],stockBajo:[],recetas:[],ventas:[],produccion:[],mermas:[],bitacora:[],
  loading:false,searchQuery:'',filterDate:'',reportTab:'ventas',invFilter:'todos',cartItems:{},
  coffee_products:[
    {categoria:'Bebidas Calientes',producto:'Cappuccino',precio:45,ingredientes:[{ing:'Café espresso',cant:2,unit:'shots'},{ing:'Leche',cant:200,unit:'ml'},{ing:'Crema de leche',cant:50,unit:'ml'}]},

    {categoria:'Bebidas Calientes',producto:'Americano',precio:30,ingredientes:[{ing:'Café espresso',cant:2,unit:'shots'},{ing:'Agua caliente',cant:200,unit:'ml'}]},
    {categoria:'Bebidas Calientes',producto:'Espresso',precio:20,ingredientes:[{ing:'Café espresso',cant:1,unit:'shots'}]},
    {categoria:'Bebidas Calientes',producto:'Mocha',precio:50,ingredientes:[{ing:'Café espresso',cant:2,unit:'shots'},{ing:'Leche',cant:200,unit:'ml'},{ing:'Chocolate',cant:30,unit:'gr'},{ing:'Crema batida',cant:50,unit:'ml'}]},

const Sheets={
  async read(sh,rg){const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}/values/${encodeURIComponent(sh)}!${rg}?key=${S.apiKey}`);if(!r.ok)throw new Error(r.status);const d=await r.json();return d.values||[]},
  async append(sh,v){const r=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({sheet:sh,values:v})});const d=await r.json();if(!d.success)throw new Error(d.error);return d},
  async deleteRow(sh,row){const r=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'delete',sheet:sh,row:row})});const d=await r.json();if(!d.success)throw new Error(d.error);return d},
  async loadUsers(){try{const rows=await this.read('👤 Usuarios','A2:E50');S.usuarios=rows.map(r=>({id:r[0]||'',usuario:r[1]||'',password:r[2]||'',nombre:r[3]||'',rol:(r[4]||'usuario').toLowerCase()})).filter(u=>u.usuario);return true}catch(e){console.error(e);return false}},
  async loadAll(){S.loading=true;render();try{
    const c=await this.read('☕ Catálogo','A2:F100');S.catalogo=c.map((r,i)=>({id:r[0]||'',categoria:r[1]||'',producto:r[2]||'',stockMinimo:parseFloat(r[3])||0,unidad:r[4]||'',activo:(r[5]||'SI').toString().trim().toUpperCase(),_row:i+2})).filter(p=>p.producto&&p.activo!=='NO');
    const iv=await this.read('📊 Inventario','A2:G100');S.inventario=iv.map(r=>({categoria:r[0]||'',producto:r[1]||'',stockActual:parseFloat(r[2])||0,totalEntradas:parseFloat(r[3])||0,totalConsumo:parseFloat(r[4])||0,stockMinimo:parseFloat(r[5])||0,estado:r[6]||''})).filter(p=>p.producto);
    const sb=await this.read('🚨 Stock Bajo','A2:E100');S.stockBajo=sb.map(r=>({categoria:r[0]||'',producto:r[1]||'',stockActual:parseFloat(r[2])||0,stockMinimo:parseFloat(r[3])||0,faltante:parseFloat(r[4])||0})).filter(p=>p.producto);
    const rc=await this.read('🍽️ Recetas','A2:G100');S.recetas=rc.map(r=>({id:r[0]||'',categoria:r[1]||'',producto:r[2]||'',ingredientes:r[3]||'',precio:parseFloat(r[4])||0,descripcion:r[5]||'',activo:r[6]||'SI'})).filter(p=>p.producto);
    const vt=await this.read('💰 Ventas','A2:H500');S.ventas=vt.map((r,i)=>({id:r[0]||'',fecha:r[1]||'',producto:r[2]||'',cantidad:parseFloat(r[3])||0,precio:parseFloat(r[4])||0,total:parseFloat(r[5])||0,usuario:r[6]||'',notas:r[7]||'',_row:i+2})).filter(p=>p.producto).reverse().slice(0,200);
    const pd=await this.read('🏭 Producción','A2:H100');S.produccion=pd.map((r,i)=>({id:r[0]||'',fecha:r[1]||'',hora:r[2]||'',producto:r[3]||'',cantidad:parseFloat(r[4])||0,lote:r[5]||'',usuario:r[6]||'',estado:r[7]||'Completado',_row:i+2})).filter(p=>p.producto).reverse().slice(0,100);
    const mr=await this.read('⚠️ Mermas','A2:H100');S.mermas=mr.map((r,i)=>({id:r[0]||'',fecha:r[1]||'',producto:r[2]||'',cantidad:parseFloat(r[3])||0,razon:r[4]||'',usuario:r[5]||'',categoria:r[6]||'',notas:r[7]||'',_row:i+2})).filter(p=>p.producto).reverse().slice(0,100);
    const bt=await this.read('📜 Bitácora','A2:F500');S.bitacora=bt.map(r=>({fecha:r[0]||'',hora:r[1]||'',usuario:r[2]||'',accion:r[3]||'',detalle:r[4]||'',tipo:r[5]||''})).filter(b=>b.accion).reverse().slice(0,200);
    S.connected=true}catch(e){console.error(e);toast('Error al cargar',1);S.connected=false}S.loading=false;render()}
};

function toast(m,e){const t=document.getElementById('toast');t.textContent=(e?'⚠️ ':'✅ ')+m;t.className='toast show'+(e?' error':'');setTimeout(()=>t.className='toast',2500)}
function now(){const d=new Date();return{date:d.toLocaleDateString('es-MX',{year:'numeric',month:'2-digit',day:'2-digit'}),time:d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}}
function today(){return now().date}
function nextId(p,l){const n=l.map(r=>parseInt((r.id||'0').replace(/\D/g,''))||0);return p+String((n.length?Math.max(...n):0)+1).padStart(4,'0')}
function getCats(){return[...new Set(S.catalogo.map(p=>p.categoria))].filter(Boolean).sort()}
function getProds(c){return c?S.catalogo.filter(p=>p.categoria===c):S.catalogo}
function isDup(n,c){return S.catalogo.some(p=>p.producto.trim().toLowerCase()===n.trim().toLowerCase()&&p.categoria.trim().toLowerCase()===c.trim().toLowerCase())}
function isAdmin(){return S.currentUser&&S.currentUser.rol==='admin'}
function uName(){return S.currentUser?S.currentUser.nombre:''}
function uInit(){if(!S.currentUser)return'?';return S.currentUser.nombre.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2)}

async function logAction(accion,detalle,tipo){const n=now();try{await Sheets.append('📜 Bitácora',[n.date,n.time,uName(),accion,detalle,tipo])}catch(e){console.error('Log error:',e)}}

function showWorking(msg){if(document.getElementById('workingOv'))return;var msgs=['Preparando espresso...','Espumando leche...','Moliendo café...','¡Un momento por favor!','Cargando datos...','Sincronizando...'];var text=msg||msgs[Math.floor(Math.random()*msgs.length)];var ov=document.createElement('div');ov.id='workingOv';ov.className='working-overlay';ov.innerHTML='<img src="'+LOGO+'" onerror="this.textContent=☕"><div class="working-text">'+text+'</div><div class="working-dots"><span></span><span></span><span></span></div><div class="working-sub">No cierres la app</div>';document.body.appendChild(ov)}
function hideWorking(){var ov=document.getElementById('workingOv');if(ov)ov.remove()}

function showConfirm(title,msg,onYes){window._confirmYes=onYes;const cd=document.getElementById('confirmDialog');cd.style.display='block';cd.innerHTML='<div class="confirm-overlay" onclick="if(event.target===this)hideConfirm()"><div class="confirm-box"><div class="confirm-title">'+title+'</div><div class="confirm-msg">'+msg+'</div><div class="confirm-btns"><button class="btn btn-secondary btn-sm" onclick="hideConfirm()">Cancelar</button><button class="btn btn-danger btn-sm" onclick="hideConfirm();window._confirmYes()">Eliminar</button></div></div></div>'}
function hideConfirm(){document.getElementById('confirmDialog').style.display='none'}

function render(){const a=document.getElementById('app');if(S.screen==='setup')a.innerHTML=renderSetup();else if(S.screen==='login')a.innerHTML=renderLogin();else a.innerHTML=renderMain()}

function renderSetup(){
  if(S.setupStep===1)return`<div class="setup-screen"><div class="step-indicator"><div class="step-dot active"></div><div class="step-dot"></div></div><img src="${LOGO}" class="setup-logo" onerror="this.style.display='none'"><div class="setup-title">☕ Mozzafiato Baristas</div><div class="setup-desc">Conectar Google Sheet</div><div class="help-box"><h4>📋 ¿Dónde encuentro el ID?</h4><ol><li>Abre tu Google Sheet</li><li>Copia la URL</li><li>El ID está entre /d/ y /edit</li></ol></div><input class="setup-input" id="si" placeholder="ID de tu Google Sheet" value="${S.sheetId}" oninput="S.sheetId=this.value.trim();document.getElementById('btnN1').disabled=!S.sheetId" onpaste="setTimeout(()=>{S.sheetId=document.getElementById('si').value.trim();document.getElementById('btnN1').disabled=!S.sheetId},100)" onchange="S.sheetId=this.value.trim();document.getElementById('btnN1').disabled=!S.sheetId"><div style="width:100%;max-width:360px"><button class="btn btn-primary" id="btnN1" onclick="S.setupStep=2;render()" ${!S.sheetId?'disabled':''}>Siguiente →</button></div></div>`;
  return`<div class="setup-screen"><div class="step-indicator"><div class="step-dot"></div><div class="step-dot active"></div></div><img src="${LOGO}" class="setup-logo" onerror="this.style.display='none'"><div class="setup-title">API Key de Google</div><div class="setup-desc">Pega tu clave de API de Google Cloud.</div><div class="help-box"><h4>📋 Cómo obtener tu API Key</h4><ol><li>Ve a console.cloud.google.com</li><li>APIs y servicios → Credenciales</li><li>Crear credenciales → Clave de API</li></ol></div><input class="setup-input" id="ak" placeholder="Tu API Key" type="password" value="${S.apiKey}" oninput="S.apiKey=this.value.trim();document.getElementById('btnC').disabled=!S.apiKey" onpaste="setTimeout(()=>{S.apiKey=document.getElementById('ak').value.trim();document.getElementById('btnC').disabled=!S.apiKey},100)" onchange="S.apiKey=this.value.trim();document.getElementById('btnC').disabled=!S.apiKey"><div style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px"><button class="btn btn-primary" id="btnC" onclick="connectSheet()" ${!S.apiKey?'disabled':''}>\u{1F50C} Conectar</button><button class="btn btn-secondary" onclick="S.setupStep=1;render()">← Atrás</button></div></div>`}

async function connectSheet(){if(!S.sheetId||!S.apiKey)return;toast('Conectando...');try{await Sheets.read('☕ Catálogo','A1:A2');localStorage.setItem('sheetId',S.sheetId);localStorage.setItem('apiKey',S.apiKey);await Sheets.loadUsers();S.screen='login';S.connected=true;toast('¡Conectado!');render()}catch(e){toast('Error: Verifica datos',1)}}

function renderLogin(){return`<div class="setup-screen"><img src="${LOGO}" class="setup-logo" onerror="this.style.display='none'"><div class="setup-title">☕ Mozzafiato Baristas</div><div class="setup-desc">Inicia sesión</div><input class="login-input" id="lu" placeholder="👤 Usuario" autocapitalize="off" autocomplete="off"><input class="login-input" id="lp" placeholder="🔒 Contraseña" type="password" onkeydown="if(event.key==='Enter')doLogin()"><div style="width:100%;max-width:360px"><button class="btn btn-primary" onclick="doLogin()">🔑 Entrar</button></div><div style="margin-top:20px;font-size:11px;color:var(--text2)">Solicita tus credenciales al administrador</div></div>`}

async function doLogin(){const u=document.getElementById('lu').value.trim().toLowerCase(),p=document.getElementById('lp').value;if(!u||!p){toast('Completa campos',1);return}await Sheets.loadUsers();const f=S.usuarios.find(x=>x.usuario.toLowerCase()===u&&x.password===p);if(!f){toast('Credenciales incorrectas',1);return}S.currentUser={id:f.id,usuario:f.usuario,nombre:f.nombre,rol:f.rol};localStorage.setItem('currentUser',JSON.stringify(S.currentUser));S.screen='main';toast('¡Hola, '+f.nombre+'!');await Sheets.loadAll();logAction('Inicio de sesión','Acceso al sistema','login')}
function logout(){logAction('Cierre de sesión','Salió del sistema','logout');S.currentUser=null;localStorage.removeItem('currentUser');S.screen='login';modalType=null;render();toast('Sesión cerrada')}

function renderMain(){const sc=S.connected?'connected':'';let c='';switch(S.tab){case'home':c=renderHome();break;case'inventario':c=renderInv();break;case'ventas':c=renderVentas();break;case'produccion':c=renderProduccion();break;case'mermas':c=renderMermas();break;case'bitacora':c=renderBitacora();break}
return`<div class="status-bar"><div class="status-left"><div class="status-dot ${sc}"></div><img src="${LOGO}" class="app-logo" onerror="this.textContent='☕'"></div><div class="status-right"><button class="user-badge" onclick="openModal('userMenu')"><div class="user-avatar">${uInit()}</div><span class="user-name">${uName()}</span></button><button class="config-btn" onclick="openModal('settings')">⚙️</button></div></div><div class="main-content" id="mc">${S.loading?'<div class="empty-state"><div class="empty-icon">⏳</div><p>Cargando...</p></div>':c}</div><nav class="bottom-nav"><button class="nav-item ${S.tab==='home'?'active':''}" onclick="switchTab('home')"><span class="nav-icon">🏠</span>Inicio</button><button class="nav-item ${S.tab==='inventario'?'active':''}" onclick="switchTab('inventario')"><span class="nav-icon">📦</span>Inventario</button><button class="nav-item ${S.tab==='ventas'?'active':''}" onclick="switchTab('ventas')"><span class="nav-icon">💰</span>Ventas</button><button class="nav-item ${S.tab==='produccion'?'active':''}" onclick="switchTab('produccion')"><span class="nav-icon">🏭</span>Producción</button><button class="nav-item ${S.tab==='mermas'?'active':''}" onclick="switchTab('mermas')"><span class="nav-icon">⚠️</span>Mermas</button><button class="nav-item ${S.tab==='bitacora'?'active':''}" onclick="switchTab('bitacora')"><span class="nav-icon">📜</span>Bitácora</button></nav>${renderModal()}`}

function switchTab(t){S.tab=t;S.searchQuery='';S.filterDate='';S.invFilter='todos';S.reportTab='ventas';render()}

function renderHome(){const tv=S.ventas.filter(p=>p.fecha===today()).length;const tp=S.produccion.filter(p=>p.fecha===today()).length;const tm=S.mermas.filter(p=>p.fecha===today()).length;const tt=S.ventas.filter(p=>p.fecha===today()).reduce((s,p)=>s+p.total,0);const ls=S.stockBajo.length;
return`<div class="uib"><div class="uib-av">${uInit()}</div><div><div class="uib-name">Hola, ${uName()} ☕</div><div class="uib-role">${isAdmin()?'🔐 Administrador':'👤 Barista'}</div></div></div><div class="stats-grid"><div class="stat-box green"><div class="stat-number">${tv}</div><div class="stat-label">Ventas Hoy</div></div><div class="stat-box blue"><div class="stat-number">${tp}</div><div class="stat-label">Producción</div></div><div class="stat-box orange"><div class="stat-number">$${tt.toFixed(0)}</div><div class="stat-label">Total Ventas</div></div><div class="stat-box red"><div class="stat-number">${ls}</div><div class="stat-label">Stock Bajo</div></div></div><div class="quick-actions"><button class="quick-btn" onclick="openModal('venta')"><span class="quick-icon">💰</span><span class="quick-label">Venta</span></button><button class="quick-btn" onclick="openModal('produccion')"><span class="quick-icon">🏭</span><span class="quick-label">Producción</span></button><button class="quick-btn" onclick="openModal('merma')"><span class="quick-icon">⚠️</span><span class="quick-label">Merma</span></button><button class="quick-btn" onclick="openModal('inventario')"><span class="quick-icon">📦</span><span class="quick-label">Inventario</span></button>${isAdmin()?`<button class="quick-btn" onclick="openModal('receta')"><span class="quick-icon">🍽️</span><span class="quick-label">Receta</span></button>`:`<button class="quick-btn disabled"><span class="quick-icon">🍽️</span><span class="quick-label">Receta</span></button>`}<button class="quick-btn" onclick="Sheets.loadAll()"><span class="quick-icon">🔄</span><span class="quick-label">Actualizar</span></button></div>${ls>0?`<div class="card"><div class="card-header"><span class="card-title">🚨 Stock Bajo</span><span class="badge critical">${ls}</span></div>${S.stockBajo.map(p=>`<div class="inv-item"><div><div class="inv-name">${p.producto}</div><div class="inv-cat">${p.categoria}</div></div><div><div class="inv-stock low">${p.stockActual}</div><div class="inv-min">Mín: ${p.stockMinimo}</div></div></div>`).join('')}</div>`:''}`}

function renderInv(){const q=S.searchQuery.toLowerCase();const cats=getCats();const totalItems=S.inventario.length;const lowItems=S.inventario.filter(p=>p.stockActual<=p.stockMinimo&&p.stockMinimo>0).length;const okItems=totalItems-lowItems;
return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span class="card-title" style="margin:0">📦 Inventario</span>${isAdmin()?'<button class="btn btn-primary btn-sm" onclick="openModal(\'producto\')">+ Producto</button>':''}</div><div class="stats-grid three"><div class="stat-box brown"><div class="stat-number">${totalItems}</div><div class="stat-label">Total</div></div><div class="stat-box green"><div class="stat-number">${okItems}</div><div class="stat-label">OK</div></div><div class="stat-box red"><div class="stat-number">${lowItems}</div><div class="stat-label">Bajo</div></div></div><div class="search-bar"><span>🔍</span><input placeholder="Buscar..." value="${S.searchQuery}" oninput="S.searchQuery=this.value;filterResults()"></div><div class="tab-pills"><button class="tab-pill ${S.invFilter==='todos'?'active':''}" onclick="S.invFilter='todos';filterResults()">Todos</button><button class="tab-pill ${S.invFilter==='bajo'?'active':''}" onclick="S.invFilter='bajo';filterResults()">🔴 Bajo</button><button class="tab-pill ${S.invFilter==='ok'?'active':''}" onclick="S.invFilter='ok';filterResults()">🟢 OK</button>${cats.map(c=>`<button class="tab-pill ${S.invFilter===c?'active':''}" onclick="S.invFilter='${c}';filterResults()">${c}</button>`).join('')}</div><div id="resultsList">${renderInvList()}</div>`}

function filterResults(){const l=document.getElementById('resultsList');if(!l)return;
if(S.tab==='inventario'){l.innerHTML=renderInvList()}
else if(S.tab==='ventas'){l.innerHTML=renderVentasList()}
else if(S.tab==='produccion'){l.innerHTML=renderProduccionList()}
else if(S.tab==='mermas'){l.innerHTML=renderMermasList()}
else if(S.tab==='bitacora'){l.innerHTML=renderBitacoraList()}}

function renderInvList(){const q=S.searchQuery.toLowerCase();let f=S.inventario;if(q)f=f.filter(p=>p.producto.toLowerCase().includes(q)||p.categoria.toLowerCase().includes(q));
if(S.invFilter==='bajo')f=f.filter(p=>p.stockActual<=p.stockMinimo&&p.stockMinimo>0);
else if(S.invFilter==='ok')f=f.filter(p=>p.stockActual>p.stockMinimo||p.stockMinimo===0);
else if(S.invFilter!=='todos'){f=f.filter(p=>p.categoria===S.invFilter)}
return f.length===0?'<div class="empty-state"><div class="empty-icon">📦</div><p>Sin resultados</p></div>':f.map(p=>{const pc=p.stockMinimo>0?(p.stockActual/p.stockMinimo):999;const cl=pc<1?'low':pc<1.5?'warn':'ok';const bg=pc<1?'<span class="badge critical">CRÍTICO</span>':pc<1.5?'<span class="badge warning">ADVERTENCIA</span>':'<span class="badge good">OK</span>';return`<div class="inv-item">${isAdmin()?`<button class="del-btn" onclick="confirmDeleteInv('${p.producto}')" style="top:6px;right:6px">🗑️</button>`:''}<div style="flex:1"><div style="display:flex;align-items:center;gap:8px;padding-right:${isAdmin()?'30px':'0'}"><div class="inv-name">${p.producto}</div>${bg}</div><div class="inv-cat">${p.categoria} · Ent: ${p.totalEntradas} · Cons: ${p.totalConsumo}</div></div><div><div class="inv-stock ${cl}">${p.stockActual}</div><div class="inv-min">Mín: ${p.stockMinimo}</div></div></div>`}).join('')}

function renderVentas(){const q=S.searchQuery.toLowerCase();let f=S.ventas;if(q)f=f.filter(p=>p.producto.toLowerCase().includes(q));if(S.filterDate)f=f.filter(p=>p.fecha===S.filterDate);
return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span class="card-title" style="margin:0">💰 Ventas</span><button class="btn btn-primary btn-sm" onclick="openModal('venta')">+ Venta</button></div><div class="search-bar"><span>🔍</span><input placeholder="Buscar producto..." value="${S.searchQuery}" oninput="S.searchQuery=this.value;filterResults()"></div><div class="filter-date"><input type="date" value="${S.filterDate}" oninput="S.filterDate=this.value;filterResults()" placeholder="Filtrar por fecha"><button class="btn btn-secondary btn-sm" onclick="S.filterDate='';filterResults()">Limpiar</button></div><div id="resultsList">${renderVentasList()}</div>`}

function renderVentasList(){const q=S.searchQuery.toLowerCase();let f=S.ventas;if(q)f=f.filter(p=>p.producto.toLowerCase().includes(q));if(S.filterDate)f=f.filter(p=>p.fecha===S.filterDate);
return f.length===0?'<div class="empty-state"><div class="empty-icon">💰</div><p>Sin ventas</p></div>':f.map(p=>`<div class="record-item"><div class="record-top"><span class="record-product">${p.producto}</span><span class="record-qty green">$${p.total.toFixed(2)}</span></div><div class="record-meta"><span class="record-type type-entrada">Venta</span><span>📅 ${p.fecha}</span><span>👤 ${p.usuario}</span><span>📦 x${p.cantidad}</span></div>${p.notas?`<div style="font-size:11px;color:var(--text2);margin-top:6px">📝 ${p.notas}</div>`:''}</div>`).join('')}

function renderProduccion(){const q=S.searchQuery.toLowerCase();let f=S.produccion;if(q)f=f.filter(p=>p.producto.toLowerCase().includes(q));if(S.filterDate)f=f.filter(p=>p.fecha===S.filterDate);
return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span class="card-title" style="margin:0">🏭 Producción</span><button class="btn btn-primary btn-sm" onclick="openModal('produccion')">+ Producción</button></div><div class="search-bar"><span>🔍</span><input placeholder="Buscar producto..." value="${S.searchQuery}" oninput="S.searchQuery=this.value;filterResults()"></div><div class="filter-date"><input type="date" value="${S.filterDate}" oninput="S.filterDate=this.value;filterResults()" placeholder="Filtrar por fecha"><button class="btn btn-secondary btn-sm" onclick="S.filterDate='';filterResults()">Limpiar</button></div><div id="resultsList">${renderProduccionList()}</div>`}

function renderProduccionList(){const q=S.searchQuery.toLowerCase();let f=S.produccion;if(q)f=f.filter(p=>p.producto.toLowerCase().includes(q));if(S.filterDate)f=f.filter(p=>p.fecha===S.filterDate);
return f.length===0?'<div class="empty-state"><div class="empty-icon">🏭</div><p>Sin producción</p></div>':f.map(p=>`<div class="record-item"><div class="record-top"><span class="record-product">${p.producto}</span><span class="record-qty orange">${p.cantidad}</span></div><div class="record-meta"><span class="record-type type-pedido">${p.estado}</span><span>📅 ${p.fecha}</span><span>⏰ ${p.hora}</span><span>👤 ${p.usuario}</span></div>${p.lote?`<div style="font-size:11px;color:var(--text2);margin-top:6px">Lote: ${p.lote}</div>`:''}</div>`).join('')}

function renderMermas(){const q=S.searchQuery.toLowerCase();let f=S.mermas;if(q)f=f.filter(p=>p.producto.toLowerCase().includes(q));if(S.filterDate)f=f.filter(p=>p.fecha===S.filterDate);
return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span class="card-title" style="margin:0">⚠️ Mermas</span><button class="btn btn-primary btn-sm" onclick="openModal('merma')">+ Merma</button></div><div class="search-bar"><span>🔍</span><input placeholder="Buscar..." value="${S.searchQuery}" oninput="S.searchQuery=this.value;filterResults()"></div><div class="filter-date"><input type="date" value="${S.filterDate}" oninput="S.filterDate=this.value;filterResults()" placeholder="Filtrar por fecha"><button class="btn btn-secondary btn-sm" onclick="S.filterDate='';filterResults()">Limpiar</button></div><div id="resultsList">${renderMermasList()}</div>`}

function renderMermasList(){const q=S.searchQuery.toLowerCase();let f=S.mermas;if(q)f=f.filter(p=>p.producto.toLowerCase().includes(q));if(S.filterDate)f=f.filter(p=>p.fecha===S.filterDate);
return f.length===0?'<div class="empty-state"><div class="empty-icon">⚠️</div><p>Sin mermas</p></div>':f.map(p=>`<div class="record-item"><div class="record-top"><span class="record-product">${p.producto}</span><span class="record-qty red">${p.cantidad}</span></div><div class="record-meta"><span class="record-type type-merma">${p.razon||'Sin especificar'}</span><span>📅 ${p.fecha}</span><span>👤 ${p.usuario}</span></div>${p.notas?`<div style="font-size:11px;color:var(--text2);margin-top:6px">📝 ${p.notas}</div>`:''}</div>`).join('')}

function renderBitacora(){const q=S.searchQuery.toLowerCase();let f=S.bitacora;if(q)f=f.filter(b=>b.accion.toLowerCase().includes(q)||b.detalle.toLowerCase().includes(q)||b.usuario.toLowerCase().includes(q));
return`<div style="margin-bottom:14px"><span class="card-title" style="margin:0">📜 Bitácora de Actividad</span></div><div class="search-bar"><span>🔍</span><input placeholder="Buscar acción, usuario..." value="${S.searchQuery}" oninput="S.searchQuery=this.value;filterResults()"></div><div id="resultsList">${renderBitacoraList()}</div>`}

function renderBitacoraList(){const q=S.searchQuery.toLowerCase();let f=S.bitacora;if(q)f=f.filter(b=>b.accion.toLowerCase().includes(q)||b.detalle.toLowerCase().includes(q)||b.usuario.toLowerCase().includes(q));
return f.length===0?'<div class="empty-state"><div class="empty-icon">📜</div><p>Sin registros</p></div>':f.map(b=>{const lc=b.tipo==='venta'?'log-entrada':b.tipo==='produccion'?'log-consumo':b.tipo==='merma'?'log-merma':b.tipo==='delete'?'log-delete':b.tipo==='login'?'log-login':b.tipo==='logout'?'log-logout':'';return`<div class="log-item ${lc}"><div class="log-action">${b.accion}</div><div style="font-size:12px;color:var(--text);margin-bottom:4px">${b.detalle}</div><div class="log-details"><span>📅 ${b.fecha}</span><span>⏰ ${b.hora}</span><span>👤 ${b.usuario}</span></div></div>`}).join('')}

let modalType=null;
function renderModal(){if(!modalType)return'';let c='';if(modalType==='venta')c=fmVenta();if(modalType==='produccion')c=fmProduccion();if(modalType==='merma')c=fmMerma();if(modalType==='inventario')c=fmInventario();if(modalType==='receta')c=fmReceta();if(modalType==='producto')c=fmProducto();if(modalType==='settings')c=fmSettings();if(modalType==='userMenu')c=fmUser();return`<div class="modal-overlay active" id="modal" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-handle"></div>${c}</div></div>`}
function openModal(t){if((t==='receta'||t==='producto')&&!isAdmin()){toast('Solo admin',1);return}modalType=t;render()}
function closeModal(){modalType=null;render()}

function fmUser(){return`<div class="modal-title">👤 Mi Cuenta</div><div style="text-align:center;margin-bottom:20px"><div style="width:60px;height:60px;border-radius:16px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto 12px">${uInit()}</div><div style="font-size:18px;font-weight:700">${uName()}</div><div style="font-size:13px;color:var(--text2);margin-top:4px">@${S.currentUser?.usuario||''}</div></div><button class="btn btn-danger" onclick="logout()">🚪 Cerrar Sesión</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>`}

function fmVenta(){const cats=getCats();return`<div class="modal-title">💰 Nueva Venta</div><div style="background:var(--surface2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;display:flex;align-items:center;gap:8px"><span>👤</span><strong>${uName()}</strong></div><div class="form-group"><label class="form-label">Categoría</label><select class="form-select" id="fVC" onchange="updSelVenta('fVP',this.value)"><option value="">Seleccionar...</option>${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Producto</label><div id="fVPWrap"><div class="autocomplete-wrap"><input class="form-input" id="fVP" placeholder="🔍 Escribir para buscar..." oninput="acInputVenta('fVP',document.getElementById('fVC').value)" onfocus="acInputVenta('fVP',document.getElementById('fVC').value)" autocomplete="off"><div class="autocomplete-list" id="fVPList"></div></div></div></div><div class="form-group"><label class="form-label">Cantidad</label><input class="form-input" id="fVQ" type="number" inputmode="decimal" placeholder="0" min="0.1" step="0.1"></div><div class="form-group"><label class="form-label">Precio</label><input class="form-input" id="fVPr" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01"></div><div class="form-group"><label class="form-label">Notas (opcional)</label><textarea class="form-textarea" id="fVN" placeholder="Observaciones..."></textarea></div><button class="btn btn-primary" onclick="submitVenta()">✅ Guardar Venta</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">✖ Cerrar</button>`}

function fmProduccion(){const cats=getCats();return`<div class="modal-title">🏭 Nueva Producción</div><div class="form-group"><label class="form-label">Categoría</label><select class="form-select" id="fPdC" onchange="updSelVenta('fPdP',this.value)"><option value="">Seleccionar...</option>${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Producto</label><div id="fPdPWrap"><div class="autocomplete-wrap"><input class="form-input" id="fPdP" placeholder="🔍 Escribir para buscar..." oninput="acInputVenta('fPdP',document.getElementById('fPdC').value)" onfocus="acInputVenta('fPdP',document.getElementById('fPdC').value)" autocomplete="off"><div class="autocomplete-list" id="fPdPList"></div></div></div></div><div class="form-group"><label class="form-label">Cantidad</label><input class="form-input" id="fPdQ" type="number" inputmode="decimal" placeholder="0" min="0.1" step="0.1"></div><div class="form-group"><label class="form-label">Lote (opcional)</label><input class="form-input" id="fPdL" placeholder="Número de lote..."></div><button class="btn btn-primary" onclick="submitProduccion()">✅ Guardar</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">✖ Cerrar</button>`}

function fmMerma(){const cats=getCats();return`<div class="modal-title">⚠️ Registrar Merma</div><div class="form-group"><label class="form-label">Categoría</label><select class="form-select" id="fMrC" onchange="updSelVenta('fMrP',this.value)"><option value="">Seleccionar...</option>${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Producto</label><div id="fMrPWrap"><div class="autocomplete-wrap"><input class="form-input" id="fMrP" placeholder="🔍 Escribir para buscar..." oninput="acInputVenta('fMrP',document.getElementById('fMrC').value)" onfocus="acInputVenta('fMrP',document.getElementById('fMrC').value)" autocomplete="off"><div class="autocomplete-list" id="fMrPList"></div></div></div></div><div class="form-group"><label class="form-label">Cantidad</label><input class="form-input" id="fMrQ" type="number" inputmode="decimal" placeholder="0" min="0.1" step="0.1"></div><div class="form-group"><label class="form-label">Razón</label><select class="form-select" id="fMrRz"><option value="">Seleccionar...</option><option value="Vencimiento">Vencimiento</option><option value="Derrame">Derrame</option><option value="Quemado">Quemado</option><option value="Contaminación">Contaminación</option><option value="Error">Error de medida</option><option value="Otro">Otro</option></select></div><div class="form-group"><label class="form-label">Notas (opcional)</label><textarea class="form-textarea" id="fMrN" placeholder="Detalles..."></textarea></div><button class="btn btn-primary" onclick="submitMerma()">✅ Guardar</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">✖ Cerrar</button>`}

function fmInventario(){const cats=getCats();return`<div class="modal-title">📦 Ajuste de Inventario</div><div class="form-group"><label class="form-label">Categoría</label><select class="form-select" id="fInC" onchange="updSelVenta('fInP',this.value)"><option value="">Seleccionar...</option>${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Producto</label><div id="fInPWrap"><div class="autocomplete-wrap"><input class="form-input" id="fInP" placeholder="🔍 Escribir para buscar..." oninput="acInputVenta('fInP',document.getElementById('fInC').value)" onfocus="acInputVenta('fInP',document.getElementById('fInC').value)" autocomplete="off"><div class="autocomplete-list" id="fInPList"></div></div></div></div><div class="form-group"><label class="form-label">Stock Actual</label><input class="form-input" id="fInSA" type="number" inputmode="decimal" placeholder="0" min="0" step="0.1"></div><div class="form-group"><label class="form-label">Stock Mínimo</label><input class="form-input" id="fInSM" type="number" inputmode="decimal" placeholder="0" min="0" step="0.1"></div><div class="form-group"><label class="form-label">Notas (opcional)</label><textarea class="form-textarea" id="fInN" placeholder="Observaciones..."></textarea></div><button class="btn btn-primary" onclick="submitInventario()">✅ Guardar</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">✖ Cerrar</button>`}

function fmReceta(){const cats=getCats();return`<div class="modal-title">🍽️ Nueva Receta</div><div class="form-group"><label class="form-label">Categoría</label><select class="form-select" id="fRcC" onchange="updSelVenta('fRcP',this.value)"><option value="">Seleccionar...</option>${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Producto</label><input class="form-input" id="fRcP" placeholder="Nombre del producto..."></div><div class="form-group"><label class="form-label">Ingredientes (JSON)</label><textarea class="form-textarea" id="fRcI" placeholder='[{"ing":"Café espresso","cant":2,"unit":"shots"}]'></textarea></div><div class="form-group"><label class="form-label">Precio</label><input class="form-input" id="fRcPr" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01"></div><div class="form-group"><label class="form-label">Descripción</label><textarea class="form-textarea" id="fRcD" placeholder="Descripción..."></textarea></div><button class="btn btn-primary" onclick="submitReceta()">✅ Guardar</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">✖ Cerrar</button>`}

function fmProducto(){return`<div class="modal-title">➕ Nuevo Producto</div><div class="form-group"><label class="form-label">Categoría</label><select class="form-select" id="fPrCat"><option value="">Seleccionar...</option>${getCats().map(c=>`<option value="${c}">${c}</option>`).join('<option value="">---</option>')}<option value="">Nuevo...</option></select><input class="form-input" id="fPrCatNew" placeholder="Nueva categoría..." style="display:none;margin-top:8px"></div><div class="form-group"><label class="form-label">Nombre del Producto</label><input class="form-input" id="fPrNom" placeholder="Nombre..."></div><div class="form-group"><label class="form-label">Stock Mínimo</label><input class="form-input" id="fPrMin" type="number" inputmode="decimal" placeholder="0" min="0" step="0.1"></div><div class="form-group"><label class="form-label">Unidad</label><select class="form-select" id="fPrUni"><option value="ml">ml (mililitros)</option><option value="gr">gr (gramos)</option><option value="shots">shots (tiros)</option><option value="pzas">pzas (piezas)</option><option value="kg">kg (kilogramos)</option><option value="L">L (litros)</option></select></div><button class="btn btn-primary" onclick="submitProducto()">✅ Crear</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">✖ Cerrar</button>`}

function fmSettings(){return`<div class="modal-title">⚙️ Configuración</div><div style="text-align:center;margin-bottom:20px"><img src="${LOGO}" style="height:40px;opacity:.7" onerror="this.style.display='none'"></div><div class="form-group"><label class="form-label">Sheet ID</label><input class="form-input" value="${S.sheetId}" id="sS" style="font-family:'Space Mono';font-size:12px"></div><div class="form-group"><label class="form-label">API Key</label><input class="form-input" value="${S.apiKey}" id="sA" type="password" style="font-family:'Space Mono';font-size:12px"></div><button class="btn btn-primary" onclick="saveSett()">💾 Guardar</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="resetApp()" style="color:var(--red)">🗑️ Desconectar</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>`}

function saveSett(){S.sheetId=document.getElementById('sS').value;S.apiKey=document.getElementById('sA').value;localStorage.setItem('sheetId',S.sheetId);localStorage.setItem('apiKey',S.apiKey);toast('Guardado');closeModal();Sheets.loadAll()}
function resetApp(){localStorage.clear();S.sheetId='';S.apiKey='';SCRIPT_URL='';S.screen='setup';S.setupStep=1;S.connected=false;S.currentUser=null;closeModal();render()}

function updSelVenta(id,cat){const inp=document.getElementById(id);const lst=document.getElementById(id+'List');inp.value='';lst.innerHTML='';if(!cat){inp.disabled=true;return}inp.disabled=false}

function acInputVenta(id,cat){const inp=document.getElementById(id);const lst=document.getElementById(id+'List');const v=inp.value.toLowerCase().trim();const prods=getProds(cat);const filtered=prods.filter(p=>p.producto.toLowerCase().includes(v));lst.className='autocomplete-list';if(v.length===0||filtered.length===0){lst.className='autocomplete-list';return}lst.className='autocomplete-list show';lst.innerHTML=filtered.map(p=>`<div class="autocomplete-item" onclick="document.getElementById('${id}').value='${p.producto}';document.getElementById('${id}').focus();document.getElementById('${id}List').className='autocomplete-list'">${p.producto}</div>`).join('')}

async function submitVenta(){const cat=document.getElementById('fVC').value;const prod=document.getElementById('fVP').value;const qty=parseFloat(document.getElementById('fVQ').value);const price=parseFloat(document.getElementById('fVPr').value);const notes=document.getElementById('fVN').value;if(!prod||!qty||!price){toast('Completa campos requeridos',1);return}if(isDup(prod,cat)){toast('Producto duplicado',1);return}const n=now();const total=qty*price;showWorking('Registrando venta...');try{await Sheets.append('💰 Ventas',[nextId('VT',S.ventas),n.date,prod,qty,price,total,uName(),notes]);toast('✅ Venta guardada');S.ventas.unshift({id:nextId('VT',S.ventas),fecha:n.date,producto:prod,cantidad:qty,precio:price,total:total,usuario:uName(),notas:notes});await logAction('Venta registrada',`${prod} x${qty} a $${price}`,`venta`);closeModal();Sheets.loadAll()}catch(e){toast('Error al guardar',1)}hideWorking()}

async function submitProduccion(){const cat=document.getElementById('fPdC').value;const prod=document.getElementById('fPdP').value;const qty=parseFloat(document.getElementById('fPdQ').value);const lote=document.getElementById('fPdL').value;if(!prod||!qty){toast('Completa campos requeridos',1);return}const n=now();showWorking('Registrando producción...');try{await Sheets.append('🏭 Producción',[nextId('PD',S.produccion),n.date,n.time,prod,qty,lote,uName(),'Completado']);toast('✅ Producción guardada');S.produccion.unshift({id:nextId('PD',S.produccion),fecha:n.date,hora:n.time,producto:prod,cantidad:qty,lote:lote,usuario:uName(),estado:'Completado'});await logAction('Producción registrada',`${prod} x${qty}`,`produccion`);closeModal();Sheets.loadAll()}catch(e){toast('Error al guardar',1)}hideWorking()}

async function submitMerma(){const cat=document.getElementById('fMrC').value;const prod=document.getElementById('fMrP').value;const qty=parseFloat(document.getElementById('fMrQ').value);const razon=document.getElementById('fMrRz').value;const notes=document.getElementById('fMrN').value;if(!prod||!qty||!razon){toast('Completa campos requeridos',1);return}const n=now();showWorking('Registrando merma...');try{await Sheets.append('⚠️ Mermas',[nextId('MR',S.mermas),n.date,prod,qty,razon,uName(),cat,notes]);toast('✅ Merma guardada');S.mermas.unshift({id:nextId('MR',S.mermas),fecha:n.date,producto:prod,cantidad:qty,razon:razon,usuario:uName(),categoria:cat,notas:notes});await logAction('Merma registrada',`${prod} x${qty} - ${razon}`,`merma`);closeModal();Sheets.loadAll()}catch(e){toast('Error al guardar',1)}hideWorking()}

async function submitInventario(){const cat=document.getElementById('fInC').value;const prod=document.getElementById('fInP').value;const stockActual=parseFloat(document.getElementById('fInSA').value);const stockMin=parseFloat(document.getElementById('fInSM').value);const notes=document.getElementById('fInN').value;if(!prod||stockActual===''||stockMin===''){toast('Completa campos requeridos',1);return}const n=now();showWorking('Actualizando inventario...');try{await Sheets.append('📊 Inventario',[cat,prod,stockActual,0,0,stockMin,'']);toast('✅ Inventario actualizado');await logAction('Inventario actualizado',`${prod}: ${stockActual} (Mín: ${stockMin})`,`inventario`);closeModal();Sheets.loadAll()}catch(e){toast('Error al guardar',1)}hideWorking()}

async function submitReceta(){const cat=document.getElementById('fRcC').value;const prod=document.getElementById('fRcP').value;const ingJson=document.getElementById('fRcI').value;const price=parseFloat(document.getElementById('fRcPr').value);const desc=document.getElementById('fRcD').value;if(!cat||!prod||!ingJson||!price){toast('Completa campos requeridos',1);return}const n=now();showWorking('Creando receta...');try{await Sheets.append('🍽️ Recetas',[nextId('RC',S.recetas),cat,prod,ingJson,price,desc,'SI']);toast('✅ Receta creada');await logAction('Receta creada',`${prod} - $${price}`,`receta`);closeModal();Sheets.loadAll()}catch(e){toast('Error al guardar',1)}hideWorking()}

async function submitProducto(){const cat=document.getElementById('fPrCat').value;const newCat=document.getElementById('fPrCatNew').value;const catFinal=newCat||cat;const nom=document.getElementById('fPrNom').value;const min=parseFloat(document.getElementById('fPrMin').value)||0;const uni=document.getElementById('fPrUni').value;if(!nom||!catFinal||!uni){toast('Completa campos requeridos',1);return}if(isDup(nom,catFinal)){toast('Este producto ya existe',1);return}const n=now();showWorking('Creando producto...');try{await Sheets.append('☕ Catálogo',[nextId('PR',S.catalogo),catFinal,nom,min,uni,'SI']);toast('✅ Producto creado');await logAction('Producto creado',`${nom} en ${catFinal}`,`producto`);closeModal();Sheets.loadAll()}catch(e){toast('Error al guardar',1)}hideWorking()}

function confirmDeleteInv(prod){showConfirm('Eliminar Producto','¿Estás seguro de que deseas eliminar este producto?',async function(){showWorking('Eliminando...');try{const row=S.catalogo.find(p=>p.producto===prod)?._row;if(row)await Sheets.deleteRow('☕ Catálogo',row);toast('✅ Eliminado');hideConfirm();await Sheets.loadAll()}catch(e){toast('Error',1)}hideWorking()})}

(async function(){if(S.sheetId&&S.apiKey){const su=localStorage.getItem('currentUser');if(su){try{S.currentUser=JSON.parse(su);S.screen='main';S.connected=true;render();await Sheets.loadUsers();const ok=S.usuarios.find(u=>u.usuario===S.currentUser.usuario);if(!ok){toast('Cuenta deshabilitada',1);logout();return}await Sheets.loadAll()}catch(e){S.screen='login';render()}}else{S.screen='login';S.connected=true;await Sheets.loadUsers();render()}}else{render()}})();
</script>
</body>
</html>
